<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      const repoName = "Siddiui.digital"; // 👈 must match exactly

      const fullPath = window.location.pathname + window.location.search + window.location.hash;
      const baseUrl = "/" + repoName;

      const path = fullPath.startsWith(baseUrl)
        ? fullPath.slice(baseUrl.length)
        : fullPath;

      window.location.replace(
        baseUrl + "/?redirect=" + encodeURIComponent(path)
      );
    </script>
  </head>
  <body></body>
</html>
